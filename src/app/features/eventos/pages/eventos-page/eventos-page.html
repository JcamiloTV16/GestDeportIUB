<div class="card shadow-sm">
  <div class="card-header bg-warning text-dark">
    <h4 class="mb-0">Calendario de Eventos Deportivos</h4>
  </div>
  <div class="card-body">
    <div class="table-responsive">
      <table class="table table-hover">
        <thead class="table-dark">
          <tr>
            <th>#</th>
            <th>Nombre</th>
            <th>Fecha</th>
            <th>Lugar</th>
            <th>Deporte</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody>
          @for (e of eventos(); track e.id) {
            <tr>
              <td>{{ e.id }}</td>
              <td>{{ e.nombre }}</td>
              <td>{{ e.fecha }}</td>
              <td>{{ e.lugar }}</td>
              <td>{{ e.deporte }}</td>
              <td>
                @if (e.estado === 'Próximo') {
                  <span class="badge bg-success">{{ e.estado }}</span>
                } @else {
                  <span class="badge bg-secondary">{{ e.estado }}</span>
                }
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
