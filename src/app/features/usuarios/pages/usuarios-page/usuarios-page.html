<div class="card shadow-sm">
  <div class="card-header bg-primary text-white">
    <h4 class="mb-0">Gestión de Usuarios</h4>
  </div>
  <div class="card-body">
    <form class="row g-3 mb-4" (ngSubmit)="agregar()">
      <div class="col-md-4">
        <input class="form-control" placeholder="Nombre" [(ngModel)]="nuevoNombre" name="nombre" />
      </div>
      <div class="col-md-4">
        <input class="form-control" type="email" placeholder="Email" [(ngModel)]="nuevoEmail" name="email" />
      </div>
      <div class="col-md-2">
        <select class="form-select" [(ngModel)]="nuevoRol" name="rol">
          <option value="Administrador">Administrador</option>
          <option value="Entrenador">Entrenador</option>
          <option value="Deportista">Deportista</option>
        </select>
      </div>
      <div class="col-md-2">
        <button class="btn btn-primary w-100" type="submit">Agregar</button>
      </div>
    </form>

    <div class="table-responsive">
      <table class="table table-striped table-hover">
        <thead class="table-dark">
          <tr>
            <th>#</th>
            <th>Nombre</th>
            <th>Email</th>
            <th>Rol</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody>
          @for (u of usuarios(); track u.id) {
            <tr>
              <td>{{ u.id }}</td>
              <td>{{ u.nombre }}</td>
              <td>{{ u.email }}</td>
              <td><span class="badge bg-info text-dark">{{ u.rol }}</span></td>
              <td>
                <button class="btn btn-danger btn-sm" (click)="eliminar(u.id)">Eliminar</button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
