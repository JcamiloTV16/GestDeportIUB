<div class="card shadow-sm">
  <div class="card-header bg-secondary text-white">
    <h4 class="mb-0">Contacto</h4>
  </div>
  <div class="card-body">
    @if (enviado) {
      <div class="alert alert-success">Mensaje enviado correctamente. ¡Gracias por contactarnos!</div>
    }

    <form (ngSubmit)="enviar()">
      <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input class="form-control" [(ngModel)]="nombre" name="nombre" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input class="form-control" type="email" [(ngModel)]="email" name="email" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Mensaje</label>
        <textarea class="form-control" rows="4" [(ngModel)]="mensaje" name="mensaje" required></textarea>
      </div>
      <button class="btn btn-secondary" type="submit">Enviar</button>
    </form>
  </div>
</div>
